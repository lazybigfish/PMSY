<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保存为模板 - PMSY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <!-- 触发按钮（演示用） -->
    <button onclick="showModal()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
        打开保存模板弹窗
    </button>

    <!-- 保存为模板弹窗 -->
    <div id="saveTemplateModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
        <div class="absolute inset-4 md:inset-10 lg:inset-20 bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <!-- 头部 -->
            <div class="px-6 py-4 border-b border-gray-200 flex items-center justify-between bg-white">
                <h2 class="text-xl font-bold text-gray-900">保存为里程碑模板</h2>
                <button onclick="closeModal()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- 内容 -->
            <div class="flex-1 overflow-y-auto p-6">
                <div class="max-w-3xl mx-auto space-y-6">
                    <!-- 基本信息 -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 mb-4 pb-2 border-b border-gray-200">基本信息</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                    模板名称 <span class="text-red-500">*</span>
                                </label>
                                <input type="text" placeholder="如：XX项目里程碑模板" 
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">
                                    版本号 <span class="text-red-500">*</span>
                                </label>
                                <input type="text" placeholder="如：V1.0" value="V1.0"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            </div>
                        </div>
                        <div class="mt-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">描述</label>
                            <textarea rows="3" placeholder="描述该模板的适用场景和特点..."
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"></textarea>
                        </div>
                    </div>

                    <!-- 标签 -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 mb-4 pb-2 border-b border-gray-200">标签</h3>
                        <div class="flex flex-wrap gap-2 mb-3">
                            <span class="px-3 py-1 bg-blue-100 text-blue-700 text-sm rounded-full flex items-center">
                                政府项目
                                <button class="ml-2 text-blue-500 hover:text-blue-700">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                </button>
                            </span>
                            <span class="px-3 py-1 bg-green-100 text-green-700 text-sm rounded-full flex items-center">
                                标准流程
                                <button class="ml-2 text-green-500 hover:text-green-700">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                    </svg>
                                </button>
                            </span>
                        </div>
                        <div class="flex items-center space-x-2">
                            <input type="text" placeholder="输入标签后按回车添加" 
                                class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <button class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">
                                添加
                            </button>
                        </div>
                        <div class="mt-2 flex flex-wrap gap-2">
                            <span class="text-xs text-gray-500">推荐标签：</span>
                            <span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded cursor-pointer hover:bg-gray-200">软件开发</span>
                            <span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded cursor-pointer hover:bg-gray-200">工程建设</span>
                            <span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded cursor-pointer hover:bg-gray-200">敏捷开发</span>
                        </div>
                    </div>

                    <!-- 可见性设置 -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 mb-4 pb-2 border-b border-gray-200">可见性设置</h3>
                        <div class="space-y-3">
                            <label class="flex items-start p-4 border border-blue-500 bg-blue-50 rounded-lg cursor-pointer">
                                <input type="radio" name="visibility" value="public" checked class="mt-1 w-4 h-4 text-blue-600">
                                <div class="ml-3">
                                    <div class="flex items-center">
                                        <span class="font-medium text-gray-900">公开</span>
                                        <span class="ml-2 px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded">推荐</span>
                                    </div>
                                    <p class="text-sm text-gray-600 mt-1">所有用户都可以在初始化里程碑时选择使用此模板</p>
                                </div>
                            </label>
                            <label class="flex items-start p-4 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="visibility" value="private" class="mt-1 w-4 h-4 text-blue-600">
                                <div class="ml-3">
                                    <span class="font-medium text-gray-900">私有</span>
                                    <p class="text-sm text-gray-600 mt-1">仅自己可见，只有自己可以在初始化里程碑时选择使用</p>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 包含内容 -->
                    <div>
                        <h3 class="text-sm font-semibold text-gray-900 mb-4 pb-2 border-b border-gray-200">包含内容</h3>
                        <div class="space-y-3">
                            <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                                <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded">
                                <div class="ml-3 flex-1">
                                    <span class="text-sm font-medium text-gray-900">阶段结构</span>
                                    <span class="ml-2 text-sm text-gray-500">（7个阶段）</span>
                                </div>
                            </label>
                            <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                                <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded">
                                <div class="ml-3 flex-1">
                                    <span class="text-sm font-medium text-gray-900">任务列表</span>
                                    <span class="ml-2 text-sm text-gray-500">（36个任务）</span>
                                </div>
                            </label>
                            <label class="flex items-center p-3 bg-gray-50 rounded-lg cursor-pointer">
                                <input type="checkbox" checked class="w-4 h-4 text-blue-600 rounded">
                                <div class="ml-3 flex-1">
                                    <span class="text-sm font-medium text-gray-900">输出物配置</span>
                                    <span class="ml-2 text-sm text-gray-500">（文档模板和必填设置）</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- 提示信息 -->
                    <div class="bg-blue-50 rounded-lg p-4">
                        <div class="flex items-start space-x-3">
                            <svg class="w-5 h-5 text-blue-500 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            <div class="text-sm text-blue-700">
                                <p class="font-medium mb-1">💡 提示</p>
                                <p>保存后可在"系统管理 &gt; 里程碑模板管理"中查看和管理此模板。公开模板需要管理员审核后才会对所有用户可见。</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部 -->
            <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-700 hover:bg-gray-200 rounded-lg transition-colors">
                    取消
                </button>
                <button class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                    确认保存
                </button>
            </div>
        </div>
    </div>

    <script>
        function showModal() {
            document.getElementById('saveTemplateModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('saveTemplateModal').classList.add('hidden');
        }

        // 默认打开弹窗以便预览
        showModal();
    </script>
</body>
</html>
