<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相关方模块优化原型 - Figma Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .figma-border {
            border: 1px solid #E5E7EB;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .card-compact {
            transition: all 0.2s ease;
        }
        
        .card-compact:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            border-color: #8B5CF6;
        }
        
        .status-active {
            background: #ECFDF5;
            color: #059669;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 500;
        }
        
        .status-inactive {
            background: #F3F4F6;
            color: #6B7280;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 500;
        }
        
        .icon-wrapper {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .current-view {
            border: 2px solid #8B5CF6;
            background: #F5F3FF;
        }
        
        .action-btn {
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .card-compact:hover .action-btn {
            opacity: 1;
        }
        
        .scroll-indicator {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    
    <div class="max-w-7xl mx-auto">
        
        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900 mb-1">相关方模块优化原型</h1>
            <p class="text-gray-500 text-sm">Figma 风格交互演示 - 点击切换视图查看效果</p>
        </div>
        
        <!-- View Toggle -->
        <div class="flex gap-2 mb-6 p-1 bg-gray-200 rounded-xl w-fit">
            <button onclick="setView('compact')" id="btn-compact" class="current-view px-4 py-2 rounded-lg text-sm font-medium transition-all">
                紧凑视图 (4列)
            </button>
            <button onclick="setView('standard')" id="btn-standard" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-300 transition-all">
                标准视图 (3列)
            </button>
            <button onclick="setView('list')" id="btn-list" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-300 transition-all">
                列表视图
            </button>
        </div>
        
        <!-- Current View Label -->
        <div class="flex items-center justify-between mb-4">
            <div>
                <h2 class="text-lg font-semibold text-gray-800">客户库</h2>
                <p class="text-sm text-gray-500">共 28 条记录</p>
            </div>
            <div class="flex gap-2">
                <span class="text-sm text-gray-500">每页显示:</span>
                <span id="items-per-page" class="text-sm font-semibold text-purple-600">28 条</span>
            </div>
        </div>
        
        <!-- Search & Filter -->
        <div class="bg-white rounded-2xl p-4 mb-6 figma-border">
            <div class="flex gap-4 flex-wrap">
                <div class="flex-1 min-w-[200px]">
                    <input type="text" placeholder="🔍 搜索客户名称或地点..." 
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>
                <div class="flex gap-2">
                    <button class="px-4 py-2 bg-purple-100 text-purple-700 rounded-xl text-sm font-medium">全部</button>
                    <button class="px-4 py-2 bg-gray-100 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-200">合作中</button>
                    <button class="px-4 py-2 bg-gray-100 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-200">已终止</button>
                </div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-xl p-4 text-center figma-border">
                <div class="text-2xl font-bold text-gray-900">28</div>
                <div class="text-sm text-gray-500">总数</div>
            </div>
            <div class="bg-white rounded-xl p-4 text-center figma-border">
                <div class="text-2xl font-bold text-emerald-600">22</div>
                <div class="text-sm text-gray-500">合作中</div>
            </div>
            <div class="bg-white rounded-xl p-4 text-center figma-border">
                <div class="text-2xl font-bold text-gray-400">6</div>
                <div class="text-sm text-gray-500">已终止</div>
            </div>
        </div>
        
        <!-- Grid Container -->
        <div id="grid-container" class="grid grid-cols-4 gap-4">
            <!-- Cards will be inserted here -->
        </div>
        
        <!-- Info Panel -->
        <div class="mt-8 bg-gradient-to-r from-purple-50 to-blue-50 rounded-2xl p-6 figma-border">
            <h3 class="font-semibold text-gray-800 mb-3">📐 设计说明</h3>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div>
                    <h4 class="font-medium text-purple-700 mb-2">紧凑视图 (推荐)</h4>
                    <ul class="text-gray-600 space-y-1">
                        <li>• 4列网格布局，每页显示 28 条记录</li>
                        <li>• 卡片高度精简，信息聚焦核心</li>
                        <li>• 悬停显示完整联系人和操作</li>
                        <li>• 适合数据量大的场景</li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-medium text-blue-700 mb-2">标准视图</h4>
                    <ul class="text-gray-600 space-y-1">
                        <li>• 3列网格布局，每页显示 15 条记录</li>
                        <li>• 保留原有卡片设计</li>
                        <li>• 信息展示更完整</li>
                        <li>• 适合数据量适中的场景</li>
                    </ul>
                </div>
            </div>
        </div>
        
    </div>
    
    <script>
        const clients = [
            { name: '腾讯科技', location: '深圳', phone: '138****8888', code: 'TENG-001', status: 'active', contact: '张经理' },
            { name: '阿里巴巴', location: '杭州', phone: '139****9999', code: 'ALI-002', status: 'active', contact: '李总监' },
            { name: '字节跳动', location: '北京', phone: '137****7777', code: 'BYTE-003', status: 'active', contact: '王主管' },
            { name: '美团', location: '北京', phone: '136****6666', code: 'MEIT-004', status: 'active', contact: '赵经理' },
            { name: '京东集团', location: '北京', phone: '135****5555', code: 'JD-005', status: 'active', contact: '刘总监' },
            { name: '百度', location: '北京', phone: '134****4444', code: 'BAID-006', status: 'inactive', contact: '周经理' },
            { name: '网易', location: '杭州', phone: '133****3333', code: 'NETE-007', status: 'active', contact: '吴主管' },
            { name: '小米科技', location: '北京', phone: '132****2222', code: 'XIAO-008', status: 'active', contact: '郑经理' },
            { name: '拼多多', location: '上海', phone: '131****1111', code: 'PDD-009', status: 'active', contact: '孙总监' },
            { name: '快手', location: '北京', phone: '130****0000', code: 'KUAIS-010', status: 'active', contact: '钱主管' },
            { name: '滴滴出行', location: '北京', phone: '189****8888', code: 'DIDI-011', status: 'inactive', contact: '周经理' },
            { name: '哔哩哔哩', location: '上海', phone: '188****7777', code: 'BILI-012', status: 'active', contact: '吴经理' },
        ];
        
        function renderCompactCards() {
            const container = document.getElementById('grid-container');
            container.className = 'grid grid-cols-4 gap-4';
            container.innerHTML = clients.map(client => `
                <div class="card-compact bg-white rounded-xl p-3 figma-border cursor-pointer relative group">
                    <div class="flex items-start gap-3">
                        <div class="icon-wrapper ${client.status === 'active' ? 'bg-purple-100' : 'bg-gray-100'}">
                            <svg class="w-5 h-5 ${client.status === 'active' ? 'text-purple-600' : 'text-gray-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between">
                                <h3 class="font-semibold text-gray-900 text-sm truncate">${client.name}</h3>
                                <span class="${client.status === 'active' ? 'status-active' : 'status-inactive'}">${client.status === 'active' ? '合作中' : '已终止'}</span>
                            </div>
                            <p class="text-xs text-gray-500 mt-0.5 truncate">📍 ${client.location || '-'}</p>
                            <p class="text-xs text-gray-400 mt-0.5 truncate">📞 ${client.phone}</p>
                        </div>
                    </div>
                    <div class="action-btn absolute top-2 right-2 flex gap-1">
                        <button class="p-1.5 bg-gray-100 hover:bg-purple-100 rounded-lg transition-colors" title="查看">
                            <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                        <button class="p-1.5 bg-gray-100 hover:bg-blue-100 rounded-lg transition-colors" title="编辑">
                            <svg class="w-3.5 h-3.5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
            document.getElementById('items-per-page').textContent = '28 条';
        }
        
        function renderStandardCards() {
            const container = document.getElementById('grid-container');
            container.className = 'grid grid-cols-3 gap-6';
            container.innerHTML = clients.slice(0, 9).map(client => `
                <div class="card-compact bg-white rounded-2xl figma-border cursor-pointer">
                    <div class="p-6">
                        <div class="flex items-start justify-between mb-4">
                            <div class="flex items-center">
                                <div class="h-12 w-12 rounded-xl flex items-center justify-center group-hover:scale-110 transition-all ${client.status === 'active' ? 'bg-purple-100' : 'bg-gray-100'}">
                                    <svg class="h-6 w-6 ${client.status === 'active' ? 'text-purple-600' : 'text-gray-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                    </svg>
                                </div>
                                <div class="ml-3">
                                    <h3 class="text-lg font-bold text-gray-900">${client.name}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="flex items-center text-sm text-gray-500">📍 ${client.location}</span>
                                        <span class="${client.status === 'active' ? 'status-active' : 'status-inactive'}">${client.status === 'active' ? '合作中' : '已终止'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-3">
                            <span class="px-2 py-1 bg-gray-50 text-gray-500 text-xs rounded-lg font-mono">${client.code}</span>
                        </div>
                        <div class="flex items-center text-sm text-gray-600">
                            <div class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center mr-3">
                                <svg class="h-4 w-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                </svg>
                            </div>
                            <div>
                                <span class="font-semibold text-gray-900">${client.contact}</span>
                                <div class="flex items-center text-gray-400 mt-0.5 text-xs">
                                    📞 ${client.phone}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-gray-100 p-4 bg-gray-50/50 rounded-b-2xl flex justify-end space-x-2">
                        <button class="p-2 text-gray-400 hover:text-purple-600 hover:bg-purple-50 rounded-xl transition-all duration-200 hover:scale-105" title="查看详情">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                        <button class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all duration-200 hover:scale-105" title="编辑">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                        </button>
                        <button class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-all duration-200 hover:scale-105" title="删除">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
            document.getElementById('items-per-page').textContent = '15 条';
        }
        
        function renderListView() {
            const container = document.getElementById('grid-container');
            container.className = 'space-y-2';
            container.innerHTML = `
                <div class="bg-white rounded-xl figma-border overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">客户名称</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">编码</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">地点</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">联系人</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">电话</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase">状态</th>
                                <th class="text-right px-4 py-3 text-xs font-semibold text-gray-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${clients.map(client => `
                                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors cursor-pointer">
                                    <td class="px-4 py-3">
                                        <div class="flex items-center gap-3">
                                            <div class="w-8 h-8 rounded-lg ${client.status === 'active' ? 'bg-purple-100' : 'bg-gray-100'} flex items-center justify-center">
                                                <svg class="w-4 h-4 ${client.status === 'active' ? 'text-purple-600' : 'text-gray-400'}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                                                </svg>
                                            </div>
                                            <span class="font-medium text-gray-900">${client.name}</span>
                                        </div>
                                    </td>
                                    <td class="px-4 py-3 text-sm text-gray-500 font-mono">${client.code}</td>
                                    <td class="px-4 py-3 text-sm text-gray-500">${client.location}</td>
                                    <td class="px-4 py-3 text-sm text-gray-700 font-medium">${client.contact}</td>
                                    <td class="px-4 py-3 text-sm text-gray-500">${client.phone}</td>
                                    <td class="px-4 py-3">
                                        <span class="${client.status === 'active' ? 'status-active' : 'status-inactive'}">${client.status === 'active' ? '合作中' : '已终止'}</span>
                                    </td>
                                    <td class="px-4 py-3 text-right">
                                        <div class="flex gap-1 justify-end">
                                            <button class="p-1.5 text-gray-400 hover:text-purple-600 hover:bg-purple-50 rounded-lg transition-colors">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                                </svg>
                                            </button>
                                            <button class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                                </svg>
                                            </button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('items-per-page').textContent = '28 条';
        }
        
        function setView(view) {
            document.getElementById('btn-compact').className = view === 'compact' ? 'current-view px-4 py-2 rounded-lg text-sm font-medium transition-all' : 'px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-300 transition-all';
            document.getElementById('btn-standard').className = view === 'standard' ? 'current-view px-4 py-2 rounded-lg text-sm font-medium transition-all' : 'px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-300 transition-all';
            document.getElementById('btn-list').className = view === 'list' ? 'current-view px-4 py-2 rounded-lg text-sm font-medium transition-all' : 'px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-300 transition-all';
            
            if (view === 'compact') renderCompactCards();
            else if (view === 'standard') renderStandardCards();
            else renderListView();
        }
        
        // Initial render
        renderCompactCards();
    </script>
</body>
</html>
